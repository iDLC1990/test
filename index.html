<script>
const apiKey = 'AIzaSyCP7tzYiGwIZ6cymLAlv_9QgPIEshnRgqI';
const sheetId = '10W03bvKlVFlIUcxsHkzP_v_13gtnYRBmnrrO0ujB1bU';
const sheetIdArchive = '1UWu4bcuHg6NHhK8ZvjDlQAIue6R1FLBlmAlBhHBj-D8';

let combinedDataCache = []; 

const diagonalMapPrefix = {'WH8':55,'WC8':32,'WU0':43,'SQ1':43,'WM5':50,'WC7':32,'WP5':65,'WW1':75,'WM6':50};
const diagonalMapSuffix = {'860':86,'850':85,'750':75,'700':70,'650':65,'580':58,'575':58,'550':55,'545':55,'500':50,'498':50,'495':50,'490':50,'438':43,'435':43,'430':43,'428':43,'425':43,'420':43,'418':43,'415':43,'398':43,'395':43,'390':43,'348':32,'345':32,'340':32,'328':32,'325':32,'320':32,'318':32,'315':32,'278':27,'275':27,'270':27,'248':24,'245':24,'240':24,'238':24,'235':24,'230':24};

function extractDiagonal(serial) {
    if (!serial) return null;
    const s = serial.trim();
    return diagonalMapPrefix[s.substring(0, 3)] || 
           diagonalMapSuffix[s.substring(3, 6)] || 
           diagonalMapSuffix[s.slice(-3)] || null;
}

function buildSheetURL(spreadsheetId, sheetName) {
    return `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
}

async function getData(sheetName, spreadsheetId = sheetId) {
    try {
        const res = await fetch(buildSheetURL(spreadsheetId, sheetName));
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        return data.values || [];
    } catch (e) {
        console.error(`Fetch error ${sheetName}:`, e);
        return null; 
    }
}

async function fetchAndCacheData() {
    try {
        const [s1, s2, s3] = await Promise.all([
            getData('FI Station KOVALCHYK Y.', sheetId),
            getData('FI Station 2 ULANOVYCH.R', sheetId),
            getData('2024', sheetIdArchive)
        ]);

        if (!s1 && !s2) return false;

        const mapR = (r, insp) => ({
            date: r[0] || "", 
            serial: (r[2] || "").trim(), 
            type: (r[3] || "").trim().toUpperCase(), 
            status: r[4] || "",
            name: r[5] || "", 
            nameG: r[6] || "", 
            ocAfterRepair: r[9] || "", 
            comment: r[10] || "", 
            inspector: insp
        });

        combinedDataCache = [
            ...(s1 ? s1.slice(1) : []).map(r => mapR(r, 'KOVALCHYK Y.')),
            ...(s2 ? s2.slice(1) : []).map(r => mapR(r, 'ULANOVYCH.R')),
            ...(s3 ? s3.slice(1) : []).map(r => mapR(r, 'ARCHIVE'))
        ];
        return true;
    } catch (e) {
        console.error("Buffer update failed:", e);
        return false;
    }
}

function parseDatePart(val) {
    if (!val) return null;
    const first = val.split(' ')[0].trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(first)) return new Date(first);
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(first)) {
        const [d,m,y] = first.split('.');
        return new Date(`${y}-${m}-${d}`);
    }
    const parsed = Date.parse(first);
    return isNaN(parsed) ? null : new Date(parsed);
}

function getLastDate(data) {
    const dates = data.map(r => parseDatePart(r.date)).filter(d => d instanceof Date && !isNaN(d));
    return dates.length ? new Date(Math.max(...dates.map(d => d.getTime()))) : new Date();
}

const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

if(modalClose) modalClose.onclick = () => modal.classList.remove('show');
if(modal) modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

const secretBtn = document.getElementById('secret-btn-kovalchyk');
if(secretBtn) {
    secretBtn.onclick = () => {
        const dInfoText = document.getElementById('date-info').textContent;
        const lastDateStr = dInfoText.includes(':') ? dInfoText.split(':')[1].trim() : "";
        
        const records = combinedDataCache.filter(r => 
            r.inspector === 'KOVALCHYK Y.' && 
            (r.date || '').split(' ')[0] === lastDateStr &&
            ['OK','NDF','SCRAP TTL'].includes(r.status) &&
            r.type !== 'MNT'
        );

        if (!records.length) return;

        const textToCopy = records.map(r => r.serial).join('\n');
        navigator.clipboard.writeText(textToCopy).then(() => {
            const oldSymbol = secretBtn.textContent;
            secretBtn.textContent = "✓";
            setTimeout(() => secretBtn.textContent = oldSymbol, 1200);
        });
    };
}

const bulkSearchBtn = document.getElementById('bulk-search-btn');
if(bulkSearchBtn) {
    bulkSearchBtn.onclick = () => {
        if(!modalBody || !modal) return;
        modalBody.innerHTML = `
            <h3 style="color:#0ff; margin-top:0;">Bulk Search</h3>
            <textarea id="bulk-input" placeholder="Wklej SN "></textarea>
            <button id="run-bulk-search">SZUKAJ</button>
            <div id="bulk-result" style="margin-top:20px;"></div>
        `;
        modal.classList.add('show');

        document.getElementById('run-bulk-search').onclick = () => {
            const snList = document.getElementById('bulk-input').value.split('\n').map(s => s.trim()).filter(s => s !== "");
            if(!snList.length) return;

            const foundMatches = [];
            const notFound = [];

            snList.forEach(sn => {
                const matches = combinedDataCache.filter(r => (r.serial || '').trim() === sn);
                if(matches.length) {
                    matches.sort((a,b) => (parseDatePart(b.date) || 0) - (parseDatePart(a.date) || 0));
                    foundMatches.push(matches[0]);
                } else {
                    notFound.push({ serial: sn, date: '---', status: ' ', name: '---', comment: '' });
                }
            });

            const workerCounts = {};
            foundMatches.forEach(m => {
                const wName = m.name || 'UNKNOWN';
                workerCounts[wName] = (workerCounts[wName] || 0) + 1;
            });

            foundMatches.sort((a, b) => {
                const countA = workerCounts[a.name || 'UNKNOWN'];
                const countB = workerCounts[b.name || 'UNKNOWN'];
                return countB !== countA ? countB - countA : (a.name || '').localeCompare(b.name || '');
            });

            let resHtml = `<table><tr><th>Serial</th><th>Data</th><th>Status</th><th>Naprawiacz</th><th>Info</th></tr>`;
            [...foundMatches, ...notFound].forEach(r => {
                const style = r.status === 'NOT FOUND' ? 'style="color:#ff5555"' : '';
                resHtml += `<tr ${style}>
                    <td>${r.serial}</td><td>${r.date}</td><td>${r.status}</td><td>${r.name}</td><td>${r.comment}</td>
                </tr>`;
            });
            document.getElementById('bulk-result').innerHTML = resHtml + `</table>`;
        };
    };
}

function openModal(name) {
    const dInfoText = document.getElementById('date-info').textContent;
    const lastDateStr = dInfoText.includes(':') ? dInfoText.split(':')[1].trim() : "";
    const records = combinedDataCache.filter(r => r.name === name && (r.date || '').split(' ')[0] === lastDateStr);

    if (!records.length) {
        modalBody.innerHTML = "<p>Brak данных</p>";
    } else {
        let html = '<table><tr><th>Serial</th><th>Type</th><th>Status</th><th>OC</th><th>COMMENT</th></tr>';
        records.forEach(r => {
            html += `<tr><td>${r.serial || '--'}</td><td>${r.type || '--'}</td><td>${r.status || '--'}</td><td>${r.ocAfterRepair || '--'}</td><td>${r.comment || '--'}</td></tr>`;
        });
        modalBody.innerHTML = html + '</table>';
    }
    modal.classList.add('show');
}

function displayCombinedStats(filtered) {
    const stats = {};
    let tNDF=0, tOK=0, tWAIT=0, tTTL=0, tPNLA=0, gTotal=0;
    filtered.forEach(r => {
        const n = r.name || 'UNKNOWN';
        if (!stats[n]) stats[n] = { NDF:0, OK:0, WAITING:0, 'SCRAP TTL':0, 'SCRAP PNLA':0, total:0 };
        if (r.status === "NDF") { stats[n].NDF++; tNDF++; }
        if (r.status === "OK") { stats[n].OK++; tOK++; }
        if (r.status === "WAITING") { stats[n].WAITING++; tWAIT++; }
        if (r.status === "SCRAP TTL") { stats[n]["SCRAP TTL"]++; tTTL++; }
        if (r.status === "SCRAP PNLA") { stats[n]["SCRAP PNLA"]++; tPNLA++; }
        stats[n].total++; gTotal++;
    });
    const tbody = document.querySelector('#combined-table tbody');
    tbody.innerHTML = "";
    Object.keys(stats).sort().forEach(name => {
        const row = document.createElement('tr');
        row.innerHTML = `<td onclick="openModal('${name}')">${name}</td><td>${stats[name].NDF}</td><td>${stats[name].OK}</td><td>${stats[name].WAITING}</td><td>${stats[name]['SCRAP TTL']}</td><td>${stats[name]['SCRAP PNLA']}</td><td class="sum-col">${stats[name].total}</td>`;
        tbody.appendChild(row);
    });
    const tr = document.createElement('tr'); tr.className = "total-row";
    tr.innerHTML = `<td>TOTAL</td><td>${tNDF}</td><td>${tOK}</td><td>${tWAIT}</td><td>${tTTL}</td><td>${tPNLA}</td><td class="sum-col">${gTotal}</td>`;
    tbody.appendChild(tr);
}

function displayDiagonalStats(filtered) {
    const diagStats = {};
    filtered.forEach(({name, serial, status}) => {
        if (status !== "OK" && status !== "NDF") return;
        const diag = extractDiagonal(serial); if (!diag) return;
        const nm = name || 'UNKNOWN';
        if (!diagStats[nm]) diagStats[nm] = {};
        diagStats[nm][diag] = (diagStats[nm][diag] || 0) + 1;
    });
    const tbody = document.querySelector('#diag-table tbody');
    const thead = document.querySelector('#diag-table thead');
    const allDiagonals = [...new Set(Object.values(diagStats).flatMap(o => Object.keys(o)))].map(Number).sort((a,b)=>a-b);
    thead.innerHTML = `<tr><th>NAME</th>${allDiagonals.map(d => `<th>${d}</th>`).join('')}<th class="sum-col">SUMA</th></tr>`;
    tbody.innerHTML = '';
    Object.entries(diagStats).sort().forEach(([name, diags]) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${name}</td>` + allDiagonals.map(d => `<td>${diags[d]||0}</td>`).join('') + `<td class="sum-col">${Object.values(diags).reduce((a,b)=>a+b,0)}</td>`;
        tbody.appendChild(row);
    });
}

document.getElementById('search').onkeypress = async e => {
    if (e.key === 'Enter') {
        const serial = e.target.value.trim();
        const output = document.getElementById('search-result');
        const matches = combinedDataCache.filter(r => (r.serial || '').trim() === serial).sort((a,b) => (parseDatePart(b.date)||0) - (parseDatePart(a.date)||0));
        if (matches.length) {
            output.innerHTML = `<table><thead><tr><th>Data</th><th>Status</th><th>NAPRAWIACZ</th><th>FINALNA</th><th>INFO</th></tr></thead>
            <tbody>${matches.map((d, i) => `<tr ${i===0?'class="latest-record"':''}><td>${d.date}</td><td>${d.status}</td><td>${d.name}</td><td>${d.nameG}</td><td>${d.comment}</td></tr>`).join('')}</tbody></table>`;
        } else { output.innerHTML = "<p style='color:yellow'>Brak info!</p>"; }
    }
};

async function updateStats() {
    if (await fetchAndCacheData()) {
        const lastDate = getLastDate(combinedDataCache);
        const lastDateStr = lastDate.toISOString().split('T')[0];
        document.getElementById('date-info').textContent = `DATE: ${lastDateStr}`;
        const filtered = combinedDataCache.filter(r => (r.date || '').split(' ')[0] === lastDateStr);
        displayCombinedStats(filtered);
        displayDiagonalStats(filtered);
    }
}

document.getElementById('overview-toggle').onclick = () => { 
    const b = document.getElementById('overview-block'); 
    b.style.display = (window.getComputedStyle(b).display === 'none') ? 'block' : 'none'; 
};
document.getElementById('diag-toggle').onclick = () => { 
    const b = document.getElementById('diag-block'); 
    b.style.display = (window.getComputedStyle(b).display === 'none') ? 'block' : 'none'; 
};

updateStats();
setInterval(updateStats, 60000);

"https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-thatguycraig000-1563355.jpg",
"https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-thatguycraig000-1563356.jpg"
];
let bgIndex = 0;
setInterval(() => {
    bgIndex = (bgIndex + 1) % backgrounds.length;
    document.body.style.background = `url('${backgrounds[bgIndex]}') no-repeat center center fixed`;
    document.body.style.backgroundSize = "cover";
}, 180000);

// ГОРЯЧИЕ КЛАВИШИ (НАДЕЖНАЯ ВЕРСИЯ)
window.addEventListener('keydown', (e) => {
    // Если фокус в любом поле ввода, горячие клавиши не должны мешать печатать
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.key === 'Escape') modal.classList.remove('show');
        return;
    }

    if (e.altKey) {
        // Alt + 1
        if (e.code === 'Digit1' || e.key === '1') {
            e.preventDefault();
            const b = document.getElementById('overview-block');
            const isHidden = window.getComputedStyle(b).display === 'none';
            b.style.display = isHidden ? 'block' : 'none';
        }
        // Alt + 2
        if (e.code === 'Digit2' || e.key === '2') {
            e.preventDefault();
            const b = document.getElementById('diag-block');
            const isHidden = window.getComputedStyle(b).display === 'none';
            b.style.display = isHidden ? 'block' : 'none';
        }
    }

    if (e.key === 'Escape') {
        modal.classList.remove('show');
    }
}, true); // Приоритетный захват событий


if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW Registered!', reg))
      .catch(err => console.log('SW Error:', err));
  });
}
</script>
